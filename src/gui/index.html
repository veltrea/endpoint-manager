<!-- ══════════════════════════════════════════
     Script
══════════════════════════════════════════ -->
<script>
const WS_PORT = 3797;

const PRESET_ROLES = [
  { name: 'planner', desc: 'Orchestrates multi-node logic flows.', color: 'text-secondary'   },
  { name: 'coder',   desc: 'Optimized for syntax and logic.',       color: 'text-cyan-400'    },
  { name: 'fast',    desc: 'Low latency inference nodes.',           color: 'text-emerald-400' },
];

let ws        = null;
let nodes     = new Map();
let roles     = {};
let roleNames = new Set(PRESET_ROLES.map(r => r.name));
let cmdId     = 0;
const pending = new Map();
let modalRole = null;

function nextId() { return String(++cmdId); }

// ── Clock ──────────────────────────────────────────
function tickClock() {
  const s = new Date().toISOString().replace('T', ' // ').slice(0, 22) + ' UTC';
  document.getElementById('footer-clock').textContent = s;
}
tickClock();
setInterval(tickClock, 1000);

// ── WebSocket ──────────────────────────────────────
function connect() {
  ws = new WebSocket(`ws://127.0.0.1:${WS_PORT}`);
  ws.addEventListener('open', () => {
    setConnected(true);
    send({ id: nextId(), type: 'list' }).then(data => {
      nodes.clear();
      for (const n of data) nodes.set(n.id, n);
      return send({ id: nextId(), type: 'get_roles' });
    }).then(roleMap => {
      roles = roleMap;
      for (const r of Object.keys(roles)) roleNames.add(r);
      render();
    });
  });
  ws.addEventListener('close', () => {
    setConnected(false);
    setTimeout(connect, 2000);
  });
  ws.addEventListener('message', ev => {
    const msg = JSON.parse(ev.data);
    if ('id' in msg) {
      const p = pending.get(msg.id);
      if (p) { pending.delete(msg.id); msg.ok ? p.resolve(msg.data) : p.reject(new Error(msg.error)); }
    } else if ('event' in msg) {
      handleEvent(msg);
    }
  });
}

function send(cmd) {
  return new Promise((resolve, reject) => {
    pending.set(cmd.id, { resolve, reject });
    ws.send(JSON.stringify(cmd));
  });
}

function setConnected(ok) {
  const sideDot    = document.getElementById('side-dot');
  const statusText = document.getElementById('ws-status-text');
  const footerDot  = document.getElementById('footer-dot');
  const footerSt   = document.getElementById('footer-status');

  if (ok) {
    sideDot.className  = 'w-2 h-2 rounded-full bg-primary kinetic-pulse';
    statusText.textContent = `ws://127.0.0.1:${WS_PORT}`;
    statusText.className   = 'text-[10px] font-label text-emerald-400 tracking-widest';
    footerDot.className    = 'w-2 h-2 rounded-full bg-emerald-500';
    footerSt.textContent   = 'CONNECTED';
    footerSt.className     = 'text-emerald-500 font-bold';
  } else {
    sideDot.className  = 'w-2 h-2 rounded-full bg-slate-600';
    statusText.textContent = 'Reconnecting...';
    statusText.className   = 'text-[10px] font-label text-slate-500 tracking-widest';
    footerDot.className    = 'w-2 h-2 rounded-full bg-slate-600';
    footerSt.textContent   = 'OFFLINE';
    footerSt.className     = 'text-slate-500 font-bold';
  }
}

// ── Event Handler ──────────────────────────────────
function handleEvent(msg) {
  footerLog(msg.event);
  logEntry(msg.event, msg.data);
  switch (msg.event) {
    case 'node_discovered':
      nodes.set(msg.data.id, msg.data); renderNodes(); break;
    case 'node_state_changed': {
      const n = nodes.get(msg.data.nodeId);
      if (n) { n.healthStatus = msg.data.state; renderNodes(); } break;
    }
    case 'models_updated': {
      const n = nodes.get(msg.data.nodeId);
      if (n) {
        n.availableModels = msg.data.availableModels;
        n.loadedModels    = msg.data.loadedModels;
        renderNodes();
      } break;
    }
    case 'node_removed':
      nodes.delete(msg.data.nodeId); renderNodes(); break;
    case 'scan_started':
      setScanning(true); break;
    case 'scan_completed':
      for (const n of msg.data.nodes) nodes.set(n.id, n);
      renderNodes();
      setScanning(false); break;
    case 'roles_changed':
      roles = msg.data;
      for (const r of Object.keys(roles)) roleNames.add(r);
      renderRoles(); renderNodes(); break;
  }
}

function setScanning(scanning) {
  const label = document.getElementById('scan-label');
  const btn   = document.getElementById('btn-scan');
  const btn2  = document.getElementById('btn-scan-bottom');
  label.textContent   = scanning ? 'Scanning...' : 'Scan Network';
  btn.style.opacity   = scanning ? '0.5' : '';
  btn2.textContent    = scanning ? 'Scanning...' : 'Scan Network';
  btn2.disabled       = scanning;
}

function footerLog(msg) {
  const el = document.getElementById('footer-log');
  el.textContent = 'SYSTEM LOGS: ' + msg;
}

// ── Log Strip ──────────────────────────────────────
function logEntry(event, data) {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString('ja-JP');
  const summary = data ? JSON.stringify(data).slice(0, 120) : '';
  const div = document.createElement('div');
  div.className = 'text-[10px] font-label text-slate-500 flex gap-2 shrink-0';
  div.innerHTML = `<span class="text-slate-600">${ts}</span><span class="text-primary font-medium">${event}</span><span class="text-slate-600 truncate">${esc(summary)}</span>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 200) el.removeChild(el.firstChild);
}

// ══════════════════════════════════════════════════
// Roles Sidebar
// ══════════════════════════════════════════════════
function renderRoles() {
  const list = document.getElementById('roles-list');
  list.innerHTML = '';

  for (const roleName of roleNames) {
    const assignedId   = roles[roleName] ?? null;
    const assignedNode = assignedId ? nodes.get(assignedId) : null;
    const preset       = PRESET_ROLES.find(r => r.name === roleName);
    const colorClass   = preset?.color ?? 'text-slate-300';
    const desc         = assignedNode
      ? nodeLabel(assignedNode)
      : (preset?.desc ?? '未割り当て');
    const countLabel   = assignedId ? '1 ACTIVE' : '—';

    const item = document.createElement('div');
    item.className = 'group cursor-pointer';
    item.addEventListener('click', () => openModal(roleName));

    item.innerHTML = `
      <div class="flex justify-between items-center mb-1">
        <span class="text-[11px] font-bold ${colorClass} font-label">#${esc(roleName)}</span>
        <span class="text-[10px] text-slate-500 font-label">${!preset ? `<button class="text-[9px] text-slate-600 hover:text-error opacity-0 group-hover:opacity-100 transition-opacity" onclick="event.stopPropagation();removeRole('${esc(roleName)}')">✕</button>` : countLabel}</span>
      </div>
      <p class="text-[10px] text-slate-500 leading-tight truncate">${esc(desc)}</p>
    `;
    list.appendChild(item);
  }
}

// ── Assign Modal ───────────────────────────────────
function openModal(roleName) {
  modalRole = roleName;
  document.getElementById('modal-title').textContent = `#${roleName} — 割り当て`;

  const sel = document.getElementById('modal-select');
  sel.innerHTML = '<option value="">— 未割り当て —</option>';
  const assignedId = roles[roleName] ?? '';
  for (const node of [...nodes.values()].sort((a,b) => a.providerUrl.localeCompare(b.providerUrl))) {
    const opt = document.createElement('option');
    opt.value = node.id;
    opt.textContent = nodeLabel(node) + ' (' + node.healthStatus + ')';
    if (node.id === assignedId) opt.selected = true;
    sel.appendChild(opt);
  }
  document.getElementById('assign-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('assign-modal').classList.remove('open');
  modalRole = null;
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('assign-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById('modal-apply').addEventListener('click', () => {
  if (!modalRole) return;
  const nodeId = document.getElementById('modal-select').value;
  if (!nodeId) unassignRole(modalRole); else assignRole(modalRole, nodeId);
  closeModal();
});
document.getElementById('modal-unassign').addEventListener('click', () => {
  if (!modalRole) return;
  unassignRole(modalRole);
  closeModal();
});

function assignRole(roleName, nodeId) {
  send({ id: nextId(), type: 'assign_role', role: roleName, endpointId: nodeId })
    .catch(e => alert('割り当て失敗: ' + e.message));
}
function unassignRole(roleName) {
  send({ id: nextId(), type: 'unassign_role', role: roleName })
    .catch(e => alert('解除失敗: ' + e.message));
}
function removeRole(roleName) {
  if (PRESET_ROLES.some(r => r.name === roleName)) return;
  unassignRole(roleName);
  roleNames.delete(roleName);
  renderRoles();
}

document.getElementById('btn-add-role').addEventListener('click', () => {
  const input = document.getElementById('new-role-name');
  const name  = input.value.trim().toLowerCase().replace(/\s+/g, '_');
  if (!name || roleNames.has(name)) return;
  roleNames.add(name);
  input.value = '';
  renderRoles();
});
document.getElementById('new-role-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-add-role').click();
});

// ══════════════════════════════════════════════════
// Node Grid
// ══════════════════════════════════════════════════
function nodeLabel(node) {
  return node.label || node.providerUrl.replace(/^https?:\/\//, '').replace('/v1', '');
}
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function timeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 60000)   return `${Math.floor(d/1000)}s ago`;
  if (d < 3600000) return `${Math.floor(d/60000)}m ago`;
  return new Date(ts).toLocaleTimeString('ja-JP');
}

const BORDER_COLOR = {
  Online:      'border-emerald-400',
  Offline:     'border-error/50',
  Unreachable: 'border-slate-600',
  RateLimited: 'border-yellow-500',
};
const DOT_COLOR = {
  Online:      'bg-emerald-400',
  Offline:     'bg-error',
  Unreachable: 'bg-slate-500',
  RateLimited: 'bg-yellow-500',
};
const HEALTH_TEXT_COLOR = {
  Online:      'text-emerald-400',
  Offline:     'text-error',
  Unreachable: 'text-slate-500',
  RateLimited: 'text-yellow-400',
};

function renderNodes() {
  const grid = document.getElementById('nodes-grid');
  const online = [...nodes.values()].filter(n => n.healthStatus === 'Online').length;
  document.getElementById('stat-online').textContent = online;
  document.getElementById('stat-total').textContent  = nodes.size;
  document.getElementById('footer-nodes-info').textContent =
    `NODES: ${online} ONLINE / ${nodes.size} TOTAL`;

  if (nodes.size === 0) {
    grid.innerHTML = `
      <div class="col-span-full text-center py-24 text-slate-600">
        <span class="material-symbols-outlined text-5xl block mb-3 opacity-20">hub</span>
        <p class="font-headline text-sm uppercase tracking-widest">No nodes detected</p>
        <p class="font-label text-xs mt-1 opacity-50">Scan the network or add an endpoint manually</p>
      </div>`;
    appendPlaceholderCard(grid);
    return;
  }

  // nodeId → ロール名[]
  const rolesByNode = {};
  for (const [role, nodeId] of Object.entries(roles)) {
    (rolesByNode[nodeId] ??= []).push(role);
  }

  grid.innerHTML = '';
  const sorted = [...nodes.values()].sort((a,b) => b.lastSeenAt - a.lastSeenAt);

  for (const node of sorted) {
    const hs         = node.healthStatus ?? 'Unreachable';
    const borderCls  = BORDER_COLOR[hs] ?? 'border-slate-600';
    const dotCls     = DOT_COLOR[hs] ?? 'bg-slate-500';
    const textCls    = HEALTH_TEXT_COLOR[hs] ?? 'text-slate-500';
    const pulseClass = hs === 'Online' ? 'kinetic-pulse' : '';
    const dimClass   = (hs === 'Offline' || hs === 'Unreachable') ? 'opacity-60' : '';
    const label      = nodeLabel(node);
    const ts         = node.lastSeenAt ? timeAgo(node.lastSeenAt) : '—';
    const myRoles    = rolesByNode[node.id] ?? [];
    const allModels  = node.availableModels ?? [];
    const loadedSet  = new Set(node.loadedModels ?? []);

    // ロールチップ
    const roleChips = myRoles.map(r =>
      `<span class="px-2 py-0.5 bg-secondary-container/20 text-secondary rounded text-[9px] font-bold font-label tracking-tighter">#${esc(r)}</span>`
    ).join('');

    // モデルチップ (先頭3件)
    const modelChips = allModels.slice(0, 3).map(m =>
      `<span class="px-2 py-0.5 ${loadedSet.has(m) ? 'bg-emerald-900/30 text-emerald-400' : 'bg-slate-800 text-slate-400'} rounded text-[9px] font-bold font-label tracking-tighter">${esc(m)}</span>`
    ).join('') + (allModels.length > 3 ? `<span class="px-2 py-0.5 bg-slate-800 text-slate-500 rounded text-[9px] font-label">+${allModels.length - 3}</span>` : '');

    // PROBE ボタンスタイル
    let probeBtnCls;
    if (hs === 'Online')  probeBtnCls = 'bg-primary text-on-primary-container';
    else if (hs === 'Offline') probeBtnCls = 'bg-error text-on-error';
    else probeBtnCls = 'bg-surface-container-highest border border-primary/20 hover:border-primary/60 text-primary';

    const card = document.createElement('div');
    card.className = `node-card bg-surface-container-low rounded-xl p-6 border-l-4 ${borderCls} ${dimClass} group hover:bg-surface-container transition-colors relative overflow-hidden`;
    card.draggable = true;
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('nodeId', node.id);
      e.dataTransfer.effectAllowed = 'copy';
    });

    card.innerHTML = `
      <div class="delete-btn absolute top-0 right-0 p-4">
        <button onclick="removeNode('${esc(node.id)}')"
          class="material-symbols-outlined text-slate-500 hover:text-error transition-colors">delete</button>
      </div>
      <div class="flex justify-between items-start mb-6">
        <div>
          <h3 class="font-headline text-lg font-bold text-on-surface mb-1 pr-8">${esc(label)}</h3>
          <div class="flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full ${dotCls} ${pulseClass}"></span>
            <span class="text-[10px] font-label ${textCls} font-bold uppercase tracking-widest">${hs}</span>
          </div>
        </div>
        <div class="text-right">
          <span class="text-[10px] font-label text-slate-500 block">ENDPOINT</span>
          <span class="text-[11px] font-label text-on-surface-variant">${esc(node.providerUrl.replace(/^https?:\/\//,'').replace('/v1',''))}</span>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 mb-8 min-h-5">
        ${roleChips}
        ${modelChips || '<span class="text-[9px] text-slate-700 font-label">No models</span>'}
      </div>
      <div class="flex justify-between items-center">
        <span class="text-[10px] font-label text-slate-600 uppercase tracking-widest">${ts}</span>
        <button onclick="probeNode('${esc(node.id)}')"
          class="px-4 py-1.5 ${probeBtnCls} text-[10px] font-headline font-bold rounded-lg transition-all active:scale-95">PROBE</button>
      </div>
    `;
    grid.appendChild(card);
  }

  appendPlaceholderCard(grid);
}

function appendPlaceholderCard(grid) {
  const ph = document.createElement('div');
  ph.className = 'border-2 border-dashed border-outline-variant/30 rounded-xl p-6 flex flex-col items-center justify-center gap-4 group cursor-pointer hover:border-primary/50 transition-all hover:bg-primary/5';
  ph.innerHTML = `
    <div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center border border-outline-variant/20 group-hover:scale-110 transition-transform">
      <span class="material-symbols-outlined text-primary text-3xl">add</span>
    </div>
    <div class="text-center">
      <h3 class="font-headline text-sm font-bold text-on-surface uppercase tracking-widest">Add Endpoint</h3>
      <p class="text-[10px] font-label text-slate-500 mt-1">Register a node manually</p>
    </div>
  `;
  ph.addEventListener('click', () => document.getElementById('add-url').focus());
  grid.appendChild(ph);
}

function render() { renderRoles(); renderNodes(); }

// ── Node Actions ───────────────────────────────────
function probeNode(id) {
  send({ id: nextId(), type: 'probe', endpointId: id })
    .then(n => { nodes.set(n.id, n); renderNodes(); })
    .catch(e => alert('プローブ失敗: ' + e.message));
}
function removeNode(id) {
  if (!confirm('このノードを削除しますか？')) return;
  send({ id: nextId(), type: 'remove_endpoint', endpointId: id })
    .then(() => { nodes.delete(id); render(); })
    .catch(e => alert('削除失敗: ' + e.message));
}

// ── Toolbar ────────────────────────────────────────
function doScan() {
  send({ id: nextId(), type: 'scan' }).catch(console.error);
}
document.getElementById('btn-scan').addEventListener('click', doScan);
document.getElementById('btn-scan-bottom').addEventListener('click', doScan);

document.getElementById('btn-refresh').addEventListener('click', () => {
  Promise.all([
    send({ id: nextId(), type: 'list' }),
    send({ id: nextId(), type: 'get_roles' }),
  ]).then(([nodeList, roleMap]) => {
    nodes.clear();
    for (const n of nodeList) nodes.set(n.id, n);
    roles = roleMap;
    for (const r of Object.keys(roles)) roleNames.add(r);
    render();
  }).catch(console.error);
});

document.getElementById('btn-add').addEventListener('click', () => {
  const url   = document.getElementById('add-url').value.trim();
  const label = document.getElementById('add-label').value.trim();
  if (!url) return;
  send({ id: nextId(), type: 'add_endpoint', url, label: label || undefined })
    .then(node => {
      nodes.set(node.id, node);
      render();
      document.getElementById('add-url').value   = '';
      document.getElementById('add-label').value = '';
    })
    .catch(e => alert('追加失敗: ' + e.message));
});
document.getElementById('add-url').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-add').click();
});

connect();
</script>
</body>
</html>
